name: Claude Code Automation

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude:
    if: >
      (github.event_name == 'issues' && github.event.label.name == 'claude-code') ||
      (github.event_name == 'issue_comment' && contains(github.event.issue.labels.*.name, 'claude-code')) ||
      (github.event_name == 'pull_request_review_comment') ||
      (github.event_name == 'pull_request_review' && github.event.review.state == 'changes_requested')
    runs-on: ubuntu-latest
    concurrency:
      group: claude-${{ github.event.issue.number || github.event.pull_request.number }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          trigger_phrase: "@claude"
          label_trigger: "claude-code"
          additional_permissions: "Bash(npm run build:*),Bash(npx tsc:*),Bash(npm ci:*),Bash(npm install:*)"
          prompt: |
            You are an automated developer for the TClub website (React + Vite + TypeScript + Tailwind CSS).
            When triggered on an issue, implement the requested changes:
            1. Create or edit the necessary files
            2. Run `npm ci && npm run build` to verify the build passes
            3. Commit and push your changes to a new branch
            4. The workflow will handle PR creation
            When triggered on a PR review, address the review comments and push fixes.

  # Auto-merge when CodeRabbit approves
  auto-merge:
    if: >
      github.event_name == 'pull_request_review' &&
      github.event.review.state == 'approved' &&
      github.event.review.user.login == 'coderabbitai[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          echo "CodeRabbit approved PR #${PR_NUMBER}, merging..."
          gh pr merge $PR_NUMBER \
            --repo ${{ github.repository }} \
            --squash \
            --delete-branch
          echo "PR #${PR_NUMBER} merged successfully."
