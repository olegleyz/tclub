name: Claude Code Automation

on:
  issues:
    types: [labeled, opened]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  implement:
    if: >
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'claude-code')) ||
      (github.event_name == 'issue_comment' && contains(github.event.issue.labels.*.name, 'claude-code'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        id: claude
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          trigger_phrase: "@claude"
          label_trigger: "claude-code"
          prompt: |
            After implementing changes, make sure the code compiles and
            passes type checks. Run the project's build and typecheck
            commands (e.g. `npm run build`, `npm run typecheck`, or
            `npx tsc --noEmit`) and fix any errors before committing.

      # Detect the branch Claude pushed to and run validations
      - name: Detect Claude branch
        id: detect-branch
        run: |
          git fetch --all --prune
          # Get the most recent claude/* branch by commit date
          CLAUDE_BRANCH=$(git branch -r --sort=-committerdate \
            | grep 'origin/claude/' \
            | head -1 \
            | sed 's|origin/||' \
            | xargs)
          if [ -z "$CLAUDE_BRANCH" ]; then
            echo "No Claude branch found, skipping PR creation."
            echo "branch_found=false" >> "$GITHUB_OUTPUT"
          else
            echo "Found branch: $CLAUDE_BRANCH"
            echo "branch=$CLAUDE_BRANCH" >> "$GITHUB_OUTPUT"
            echo "branch_found=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout Claude branch
        if: steps.detect-branch.outputs.branch_found == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.detect-branch.outputs.branch }}
          fetch-depth: 0

      - name: Setup Node.js
        if: steps.detect-branch.outputs.branch_found == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        if: steps.detect-branch.outputs.branch_found == 'true'
        run: npm ci

      - name: Run build
        if: steps.detect-branch.outputs.branch_found == 'true'
        run: npm run build

      - name: Run typecheck
        if: steps.detect-branch.outputs.branch_found == 'true'
        run: npm run typecheck 2>/dev/null || npx tsc --noEmit 2>/dev/null || echo "No typecheck script found"

      - name: Create pull request
        if: steps.detect-branch.outputs.branch_found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER=${{ github.event.issue.number }}
          ISSUE_TITLE="${{ github.event.issue.title }}"

          # Check if a PR already exists for this branch
          EXISTING_PR=$(gh pr list \
            --head "${{ steps.detect-branch.outputs.branch }}" \
            --json number --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$EXISTING_PR" ]; then
            echo "PR #$EXISTING_PR already exists for this branch."
            exit 0
          fi

          PR_BODY="## Summary

          Automated implementation for #${ISSUE_NUMBER}.

          Closes #${ISSUE_NUMBER}

          ---
          *Automated by Claude Code*"

          gh pr create \
            --title "Fix #${ISSUE_NUMBER}: ${ISSUE_TITLE}" \
            --body "$PR_BODY" \
            --base main \
            --head "${{ steps.detect-branch.outputs.branch }}"

          echo "PR created successfully."
